# ================================================================
# deploy/components/ragflow.conf — RAGFlow component configuration
# ================================================================

COMPONENT="ragflow"
DISPLAY_NAME="RAGFlow"
LOCAL_DIR="/home/shentao.lu/.hub/ragflow/docker"
REMOTE_PATH="/opt/ragflow/docker"
COMPOSE_PROJECT="ragflow"
REMOTE_COMPOSE_FILE="docker-compose.remote.yml"

# Docker images to export (must exist locally)
IMAGES=(
    "infiniflow/ragflow:v0.26.2"
    "mysql:8.0"
    "elasticsearch:8.11.3"
    "ragflow-dify-proxy:latest"
)

# Files/directories to package (relative to LOCAL_DIR)
DATA_CONFIGS=(
    ".env"
    "service_conf.yaml.template"
    "entrypoint.sh"
    "init.sql"
    "docker-compose.remote.yml"
    "proxy/Dockerfile"
    "proxy/proxy_server.py"
    "proxy/requirements.txt"
)
DATA_DIRS=(
    "ragflow-logs"
)
DATA_EXCLUDE=()

# Services that depend on this component (deploy first)
DEPENDS_ON="dify"

# External networks (Dify's network must exist)
EXTERNAL_NETWORKS=(
    "dify_default"
)

# Health check URL after deployment
HEALTH_CHECK_URL="http://${TARGET_IP:-localhost}:9380/api/v1/version"
HEALTH_CHECK_TIMEOUT=60

# Source IP (for config replacement)
SOURCE_IP="192.168.20.21"

# === Post-deploy config transform ===
apply_remote_config() {
    # 1. Replace IPs in .env
    log "Replacing IPs in .env: ${SOURCE_IP} → ${TARGET_IP}..."
    remote "sed -i 's/${SOURCE_IP}/${TARGET_IP}/g' ${REMOTE_PATH}/.env"

    # 2. Ensure Redis points to Dify's Redis
    log "Configuring shared Redis (Dify's redis)..."
    remote "
        # Update service_conf.yaml.template to use Dify's Redis
        sed -i 's|host:.*redis.*:6379|host: \"dify-redis-1:6379\"|g' ${REMOTE_PATH}/service_conf.yaml.template
        sed -i 's|password:.*|password: \"difyai123456\"|g' ${REMOTE_PATH}/service_conf.yaml.template
        # Ensure DB 1 (RAGFlow's namespace)
        grep -q 'db: 1' ${REMOTE_PATH}/service_conf.yaml.template || \
            sed -i '/redis:/a\  db: 1' ${REMOTE_PATH}/service_conf.yaml.template
    "

    # 3. Ensure external networks exist
    for net in "${EXTERNAL_NETWORKS[@]}"; do
        if ! remote "docker network ls --format '{{.Name}}' | grep -q '^${net}$'"; then
            warn "External network '$net' not found — Dify may not be deployed yet"
            warn "Run: ./deploy.sh dify --target ${TARGET_HOST} --start"
            return 1
        fi
        ok "External network '$net' exists"
    done

    ok "RAGFlow remote config applied"
}

# === Health check ===
do_health_check() {
    log "Checking RAGFlow health at ${HEALTH_CHECK_URL}..."
    local deadline=$((SECONDS + HEALTH_CHECK_TIMEOUT))
    while [[ $SECONDS -lt $deadline ]]; do
        if curl -sf -o /dev/null "${HEALTH_CHECK_URL}" 2>/dev/null; then
            ok "RAGFlow is healthy"
            return 0
        fi
        sleep 5
        echo -n "."
    done
    echo ""
    warn "Health check timed out — RAGFlow may still be initializing (ES startup is slow)"
    return 1
}

# === Version check ===
show_version() {
    remote "docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' --filter 'name=ragflow'" 2>/dev/null || true
}
