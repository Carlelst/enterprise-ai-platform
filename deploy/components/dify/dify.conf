# ================================================================
# deploy/components/dify.conf — Dify component configuration
# ================================================================

COMPONENT="dify"
DISPLAY_NAME="Dify"
LOCAL_DIR="/home/shentao.lu/.hub/dify/docker"
REMOTE_PATH="/opt/dify/docker"
COMPOSE_PROJECT="dify"
REMOTE_COMPOSE_FILE="docker-compose.yaml"

# Docker images to export (must exist locally)
IMAGES=(
    "dify-api-patched:local"
    "dify-web-patched:local"
    "langgenius/dify-plugin-daemon:0.6.1-local"
    "langgenius/dify-sandbox:0.2.15"
    "postgres:15-alpine"
    "redis:6-alpine"
    "nginx:latest"
    "ubuntu/squid:latest"
    "semitechnologies/weaviate:1.27.0"
    "busybox:latest"
)

# Files/directories to package (relative to LOCAL_DIR)
DATA_CONFIGS=(
    ".env"
    "docker-compose.yaml"
)
DATA_DIRS=(
    "volumes"
    "nginx"
    "ssrf_proxy"
    "certbot"
)
# Directories to exclude from tar
DATA_EXCLUDE=()

# Services that depend on this component (deploy first)
DEPENDS_ON=""

# External networks this component expects on remote
EXTERNAL_NETWORKS=()

# Health check URL after deployment
HEALTH_CHECK_URL="http://${TARGET_IP:-localhost}:8086"
HEALTH_CHECK_TIMEOUT=30

# Source IP (for config replacement)
SOURCE_IP="192.168.20.21"

# === Post-deploy config transform ===
# Called on the remote host after data extraction
apply_remote_config() {
    log "Replacing IPs in .env: ${SOURCE_IP} → ${TARGET_IP}..."
    remote "
        echo 'Lines before replacement:'
        grep -c '${SOURCE_IP}' ${REMOTE_PATH}/.env 2>/dev/null || echo '0'
        sed -i 's/${SOURCE_IP}/${TARGET_IP}/g' ${REMOTE_PATH}/.env
        echo 'Lines after:'
        grep -c '${TARGET_IP}' ${REMOTE_PATH}/.env 2>/dev/null || echo '0'
    "
    ok "IP addresses replaced in .env"
}

# === Health check ===
do_health_check() {
    log "Checking Dify health at ${HEALTH_CHECK_URL}..."
    local deadline=$((SECONDS + HEALTH_CHECK_TIMEOUT))
    while [[ $SECONDS -lt $deadline ]]; do
        if curl -sf -o /dev/null "${HEALTH_CHECK_URL}"; then
            ok "Dify is healthy"
            return 0
        fi
        sleep 3
        echo -n "."
    done
    echo ""
    warn "Health check timed out — Dify may still be starting"
    return 1
}

# === Version check (optional) ===
show_version() {
    remote "docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' --filter 'name=dify'" 2>/dev/null || true
}
